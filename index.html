<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Command</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#16161f;
  --border:#1e1e2e;--border2:#2a2a3e;
  --text:#e2e2f0;--muted:#6b6b8a;
  --accent:#7c6af7;--accent2:#5b4fd4;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;--cyan:#06b6d4;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono','Fira Code',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;overflow:hidden}
.app{display:grid;grid-template-rows:48px 1fr 30px;height:100vh;overflow:hidden}

/* Header */
header{display:flex;align-items:center;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);gap:12px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;letter-spacing:-.02em}
.logo-icon{width:26px;height:26px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.metric-strip{display:flex;gap:1px;background:var(--border);border-radius:6px;overflow:hidden;margin-left:auto}
.metric{background:var(--surface2);padding:4px 10px;display:flex;flex-direction:column;align-items:center;min-width:64px}
.metric-lbl{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.05em}
.metric-val{font-weight:700;font-size:13px;margin-top:1px}
.metric-val.g{color:var(--green)}.metric-val.a{color:var(--amber)}.metric-val.r{color:var(--red)}
.hdr-meta{display:flex;align-items:center;gap:12px;margin-left:12px}
.hdr-stat{font-size:11px;color:var(--muted)}
.hdr-stat .v{color:var(--text);font-weight:500}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-sync{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--muted);padding:4px 10px;font-size:11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.btn-sync:hover{color:var(--text);border-color:var(--accent)}
.btn-sync.spin svg{animation:rot .6s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* Main 3-col */
main{display:grid;grid-template-columns:170px 1fr 290px;overflow:hidden}
.col{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.col:last-child{border-right:none}
.col-hdr{padding:10px 12px 8px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.col-body{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Agents */
.agent-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.agent-row:hover{background:var(--surface2)}
.agent-row.on{background:var(--surface2);border-left:2px solid var(--accent);padding-left:10px}
.agent-ic{font-size:15px;width:26px;height:26px;background:var(--surface2);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.agent-info{flex:1;min-width:0}
.agent-name{font-weight:500;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-sub{font-size:10px;color:var(--muted);margin-top:1px}
.ast{font-size:9px;font-weight:600;padding:2px 5px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
.ast-active{background:rgba(34,197,94,.15);color:var(--green)}
.ast-idle{background:rgba(107,107,138,.1);color:var(--muted)}
.ast-blocked{background:rgba(239,68,68,.15);color:var(--red)}

/* Log filters */
.log-filters{display:flex;gap:5px;padding:7px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.fb{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s}
.fb:hover,.fb.on{background:var(--surface2);color:var(--text);border-color:var(--accent)}

/* Log entries */
.log-date{padding:5px 12px;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2}
.log-row{display:flex;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);align-items:flex-start;transition:background .1s}
.log-row:hover{background:var(--surface2)}
.log-time{font-size:10px;color:var(--muted);font-family:var(--mono);flex-shrink:0;padding-top:1px;width:38px}
.log-ic{font-size:12px;flex-shrink:0;width:16px;text-align:center;padding-top:1px}
.log-bd{flex:1;min-width:0}
.log-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.tag-CEO{background:rgba(124,106,247,.15);color:var(--accent)}
.tag-ENGINEERING{background:rgba(6,182,212,.12);color:var(--cyan)}
.tag-MARKETING{background:rgba(245,158,11,.12);color:var(--amber)}
.tag-OUTREACH{background:rgba(239,68,68,.12);color:var(--red)}
.tag-DESIGN{background:rgba(34,197,94,.12);color:var(--green)}
.tag-QA{background:rgba(59,130,246,.12);color:var(--blue)}
.tag-DATA{background:rgba(167,139,250,.12);color:#a78bfa}
.tag-OPS{background:rgba(107,107,138,.15);color:var(--muted)}
.spill{display:inline-flex;font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;margin-left:4px;text-transform:uppercase;letter-spacing:.03em}
.spill-DONE{background:rgba(34,197,94,.15);color:var(--green)}
.spill-IN_PROGRESS{background:rgba(245,158,11,.15);color:var(--amber);animation:pulse 2s infinite}
.spill-BLOCKED{background:rgba(239,68,68,.15);color:var(--red)}
.spill-FAILED{background:rgba(239,68,68,.2);color:var(--red)}
.log-text{font-size:12px;color:var(--text);line-height:1.4}
.log-out{margin-top:2px;font-size:10px;color:var(--muted);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Log add bar */
.log-add{padding:7px 12px;border-top:1px solid var(--border);display:flex;gap:5px;flex-shrink:0}
.log-add select,.log-add input{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-size:11px;padding:4px 7px;outline:none;font-family:var(--font)}
.log-add select:focus,.log-add input:focus{border-color:var(--accent)}
.log-add input{flex:1}
.log-add button{background:var(--accent);border:none;border-radius:5px;color:#fff;font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;font-family:var(--font)}
.log-add button:hover{background:var(--accent2)}

/* Right panel tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{padding:7px 12px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.on{color:var(--text);border-bottom-color:var(--accent)}

/* Priority items */
.tier-hdr{padding:8px 12px 4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.tier-badge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:700}
.tb-T1{background:rgba(239,68,68,.2);color:#ef4444}
.tb-T2{background:rgba(245,158,11,.2);color:#f59e0b}
.tb-T3{background:rgba(59,130,246,.2);color:#3b82f6}
.tb-T4{background:rgba(107,107,138,.2);color:#6b6b8a}
.pitem{display:flex;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);align-items:flex-start;transition:background .1s}
.pitem:hover{background:var(--surface2)}
.pnum{font-size:10px;font-weight:700;color:var(--muted);width:14px;flex-shrink:0;padding-top:1px;font-family:var(--mono)}
.pbody{flex:1;min-width:0}
.ptask{font-size:12px;font-weight:500;line-height:1.35}
.pagent{display:inline-flex;font-size:9px;font-weight:600;color:var(--accent);background:rgba(124,106,247,.1);padding:1px 5px;border-radius:3px;margin-top:3px}
.pstate{font-size:9px;font-weight:600;padding:2px 5px;border-radius:4px;flex-shrink:0;text-transform:uppercase;letter-spacing:.03em}
.ps-todo{background:var(--surface2);color:var(--muted)}
.ps-active{background:rgba(245,158,11,.15);color:var(--amber)}
.ps-done{background:rgba(34,197,94,.12);color:var(--green)}
.ps-blocked{background:rgba(239,68,68,.12);color:var(--red)}

/* Decision rows */
.dec-row{display:flex;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border)}
.dec-date{font-size:10px;color:var(--muted);font-family:var(--mono);flex-shrink:0;width:80px}
.dec-text{font-size:12px;color:var(--text);line-height:1.4}

/* Memory raw view */
.mem-raw{padding:12px;font-size:11px;color:var(--muted);font-family:var(--mono);white-space:pre-wrap;line-height:1.6}

/* Statusbar */
.statusbar{display:flex;align-items:center;gap:16px;padding:0 14px;background:var(--surface);border-top:1px solid var(--border);font-size:10px;color:var(--muted)}
.statusbar .v{color:var(--text);font-weight:500}
.statusbar .sep{color:var(--border2)}
.sb-right{margin-left:auto}
.empty{padding:20px 12px;text-align:center;color:var(--muted);font-size:11px}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">
    <div class="logo-icon">V</div>
    Velocity Command
  </div>
  <div class="metric-strip">
    <div class="metric"><span class="metric-lbl">MRR</span><span class="metric-val a" id="m-mrr">$0</span></div>
    <div class="metric"><span class="metric-lbl">Installs</span><span class="metric-val" id="m-installs">0</span></div>
    <div class="metric"><span class="metric-lbl">Pipeline</span><span class="metric-val" id="m-pipeline">0</span></div>
    <div class="metric"><span class="metric-lbl">Done Today</span><span class="metric-val g" id="m-done">0</span></div>
    <div class="metric"><span class="metric-lbl">Active</span><span class="metric-val a" id="m-active">0</span></div>
  </div>
  <div class="hdr-meta">
    <span class="hdr-stat"><span class="dot"></span>Live</span>
    <span class="hdr-stat"><span class="v" id="hdr-date">—</span></span>
    <button class="btn-sync" id="syncBtn" onclick="syncAll()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>Sync
    </button>
  </div>
</header>

<main>
  <!-- AGENTS -->
  <div class="col">
    <div class="col-hdr">Agents</div>
    <div class="col-body" id="agents-col"></div>
  </div>

  <!-- LOG -->
  <div class="col" style="flex:1">
    <div class="col-hdr">
      Activity Log
      <span id="log-count" style="font-size:10px;color:var(--muted)">—</span>
    </div>
    <div class="log-filters" id="log-filters"></div>
    <div class="col-body" id="log-feed"></div>
    <div class="log-add">
      <select id="add-agent">
        <option>CEO</option><option>ENGINEERING</option><option>MARKETING</option>
        <option>OUTREACH</option><option>DESIGN</option><option>QA</option>
        <option>DATA</option><option>OPS</option>
      </select>
      <select id="add-status">
        <option>DONE</option><option>IN_PROGRESS</option>
        <option>BLOCKED</option><option>FAILED</option>
      </select>
      <input id="add-text" placeholder="Log what just happened..." />
      <button onclick="addLog()">Log</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="col">
    <div class="tabs">
      <div class="tab on" onclick="tab(this,'priority')">Priority</div>
      <div class="tab" onclick="tab(this,'decisions')">Decisions</div>
      <div class="tab" onclick="tab(this,'memory')">Memory</div>
    </div>
    <div class="col-body" id="right-body"></div>
  </div>
</main>

<div class="statusbar">
  <span>Phase: <span class="v" id="sb-phase">—</span></span>
  <span class="sep">|</span>
  <span>Build: <span class="v" id="sb-build">—</span></span>
  <span class="sep">|</span>
  <span>Runway: <span class="v" id="sb-runway">—</span></span>
  <span class="sep">|</span>
  <span>Skills: <span class="v" id="sb-skills">—</span></span>
  <span class="sb-right" id="sb-sync">Last sync: —</span>
</div>

</div>
<script>
const API = 'http://localhost:4242';
const AGENTS = [
  {id:'CEO',        icon:'🎯', name:'CEO',         sub:'Orchestrator'},
  {id:'ENGINEERING',icon:'⚙️', name:'Engineering', sub:'Eng Agent'},
  {id:'MARKETING',  icon:'📣', name:'Marketing',   sub:'Mktg Agent'},
  {id:'OUTREACH',   icon:'🎯', name:'Outreach',    sub:'GTM Agent'},
  {id:'DESIGN',     icon:'🎨', name:'Design',      sub:'Design Agent'},
  {id:'QA',         icon:'🧪', name:'QA',          sub:'QA Agent'},
  {id:'DATA',       icon:'📊', name:'Data',        sub:'Data Agent'},
  {id:'OPS',        icon:'🔧', name:'Ops',         sub:'Ops Agent'},
];

let entries=[], rawState='', rawMemory='', activeFilter='ALL', activeTab='priority';

// ── Parse ──────────────────────────────────────────────
function parseEntries(raw){
  return raw.split('\n').filter(l=>{
    if(!l.trim()||l.startsWith('#')||l.startsWith('---')||l.startsWith('##')) return false;
    return /^\d{4}-\d{2}-\d{2}/.test(l);
  }).map(l=>{
    const m=l.match(/^(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2})\s*\|\s*([^|]+)\s*\|\s*([^|]+)\s*\|\s*([^|]+)\s*\|\s*(.*)/);
    return m ? {date:m[1],time:m[2],agent:m[3].trim().toUpperCase(),status:m[4].trim().toUpperCase(),action:m[5].trim(),output:m[6].trim()} : null;
  }).filter(Boolean).reverse();
}

function parsePriority(raw){
  const tiers=[];let cur=null;let inP=false;let n=0;
  for(const l of raw.split('\n')){
    if(l.includes('## PRIORITY STACK')){inP=true;continue;}
    if(inP&&l.startsWith('## ')&&!l.includes('PRIORITY')){inP=false;continue;}
    if(!inP)continue;
    const tm=l.match(/^(T[1-4])\s*[-—]/);
    if(tm){cur={tier:tm[1],label:l.replace(/^T[1-4]\s*[-—]\s*/,'').trim(),items:[]};tiers.push(cur);n=0;continue;}
    const im=l.match(/^\d+\.\s+(.+)/);
    if(im&&cur){
      n++;
      const t=im[1];
      const am=t.match(/Agent:\s*([^|]+)/i);
      let st='todo';
      if(t.includes('IN_PROGRESS')||t.includes('◉'))st='active';
      else if(t.includes('DONE')||t.includes('✓'))st='done';
      else if(t.toLowerCase().includes('blocked'))st='blocked';
      cur.items.push({num:n,text:t.split('|')[0].replace(/Agent:.*/,'').replace(/[◉✓✗→]/g,'').trim(),agent:am?am[1].trim():null,state:st});
    }
  }
  return tiers;
}

function parseDecisions(raw){
  const out=[];let inD=false;
  for(const l of raw.split('\n')){
    if(l.includes('## DECISIONS')){inD=true;continue;}
    if(inD&&l.startsWith('## ')){inD=false;continue;}
    if(!inD||!l.trim())continue;
    const m=l.match(/^(\d{4}-\d{2}-\d{2})\s*\|\s*(.+)/);
    if(m)out.push({date:m[1],text:m[2].trim()});
  }
  return out.reverse();
}

function parseMetrics(raw){
  const g=(rx)=>{const r=raw.match(rx);return r?r[1].trim():null;};
  return {
    mrr:     g(/^MRR:\s*(.+)/m),
    installs:g(/^Active installs:\s*(.+)/m),
    pipeline:g(/^Demo pipeline:\s*(.+)/m),
    runway:  g(/^Runway:\s*(.+)/m),
    skills:  g(/^Agent skills installed:\s*(.+)/m),
    build:   g(/^VelocityOS build:\s*(.+)/m),
    phase:   g(/^Current phase:\s*(.+)/m),
  };
}

// ── Render ─────────────────────────────────────────────
const today=()=>new Date().toISOString().slice(0,10);

function renderAgents(){
  const status={},counts={},td=today();
  for(const e of entries){
    if(!counts[e.agent])counts[e.agent]=0;
    if(e.date===td)counts[e.agent]++;
    if(e.status==='IN_PROGRESS')status[e.agent]='active';
    else if(e.status==='BLOCKED'&&status[e.agent]!=='active')status[e.agent]='blocked';
    else if(!status[e.agent])status[e.agent]='idle';
  }
  document.getElementById('agents-col').innerHTML=AGENTS.map(a=>{
    const s=status[a.id]||'idle', c=counts[a.id]||0;
    return `<div class="agent-row ${s==='active'?'on':''}" onclick="setFilter('${a.id}')">
      <div class="agent-ic">${a.icon}</div>
      <div class="agent-info">
        <div class="agent-name">${a.name}</div>
        <div class="agent-sub">${c>0?c+' today':a.sub}</div>
      </div>
      <span class="ast ast-${s}">${s}</span>
    </div>`;
  }).join('');
}

function renderFilters(){
  const agents=['ALL',...new Set(entries.map(e=>e.agent))];
  document.getElementById('log-filters').innerHTML=agents.map(a=>
    `<button class="fb ${activeFilter===a?'on':''}" onclick="setFilter('${a}')">${a}</button>`
  ).join('');
}

function renderLog(){
  const feed=document.getElementById('log-feed');
  const list=activeFilter==='ALL'?entries:entries.filter(e=>e.agent===activeFilter);
  if(!list.length){feed.innerHTML='<div class="empty">No entries. Log your first task above.</div>';document.getElementById('log-count').textContent='0';return;}
  document.getElementById('log-count').textContent=list.length;
  const icons={DONE:'✓',IN_PROGRESS:'◉',BLOCKED:'⊘',FAILED:'✗'};
  let html='',lastDate=null,td=today();
  for(const e of list){
    if(e.date!==lastDate){
      html+=`<div class="log-date">${e.date===td?'Today':e.date}</div>`;
      lastDate=e.date;
    }
    const out=e.output&&e.output!=='-'?`<div class="log-out">→ ${esc(e.output)}</div>`:'';
    html+=`<div class="log-row">
      <div class="log-time">${e.time}</div>
      <div class="log-ic">${icons[e.status]||'·'}</div>
      <div class="log-bd">
        <div><span class="log-tag tag-${e.agent}">${e.agent}</span><span class="spill spill-${e.status}">${e.status.replace('_',' ')}</span></div>
        <div class="log-text">${esc(e.action)}</div>${out}
      </div>
    </div>`;
  }
  feed.innerHTML=html;
}

function renderPriority(){
  const tiers=parsePriority(rawState);
  const rb=document.getElementById('right-body');
  if(!tiers.length){rb.innerHTML='<div class="empty">No priority stack in VELOCITY_STATE.md</div>';return;}
  const sc={todo:'ps-todo',active:'ps-active',done:'ps-done',blocked:'ps-blocked'};
  const sl={todo:'To Do',active:'Active',done:'Done',blocked:'Blocked'};
  let h='';
  for(const t of tiers){
    h+=`<div class="tier-hdr"><span class="tier-badge tb-${t.tier}">${t.tier}</span><span style="color:var(--muted)">${esc(t.label)}</span></div>`;
    for(const i of t.items){
      h+=`<div class="pitem">
        <div class="pnum">${i.num}</div>
        <div class="pbody">
          <div class="ptask">${esc(i.text)}</div>
          ${i.agent?`<div class="pagent">→ ${esc(i.agent)}</div>`:''}
        </div>
        <span class="pstate ${sc[i.state]}">${sl[i.state]}</span>
      </div>`;
    }
  }
  rb.innerHTML=h;
}

function renderDecisions(){
  const d=parseDecisions(rawState);
  const rb=document.getElementById('right-body');
  if(!d.length){rb.innerHTML='<div class="empty">No decisions logged yet.</div>';return;}
  rb.innerHTML=d.map(x=>`<div class="dec-row"><div class="dec-date">${x.date}</div><div class="dec-text">${esc(x.text)}</div></div>`).join('');
}

function renderMemory(){
  const rb=document.getElementById('right-body');
  if(!rawMemory){rb.innerHTML='<div class="empty">MEMORY.md not loaded — ensure serve.py is running.</div>';return;}
  rb.innerHTML=`<div class="mem-raw">${esc(rawMemory.slice(0,3000))}</div>`;
}

function renderMetrics(m){
  if(m.mrr)      document.getElementById('m-mrr').textContent=m.mrr;
  if(m.installs) document.getElementById('m-installs').textContent=m.installs;
  if(m.pipeline) document.getElementById('m-pipeline').textContent=m.pipeline;
  if(m.phase)    document.getElementById('sb-phase').textContent=m.phase;
  if(m.build)    document.getElementById('sb-build').textContent=m.build;
  if(m.runway)   document.getElementById('sb-runway').textContent=m.runway;
  if(m.skills)   document.getElementById('sb-skills').textContent=m.skills;
}

function renderCounts(){
  const td=today();
  document.getElementById('m-done').textContent=entries.filter(e=>e.date===td&&e.status==='DONE').length;
  document.getElementById('m-active').textContent=entries.filter(e=>e.status==='IN_PROGRESS').length;
}

function renderAll(){
  renderAgents();renderFilters();renderLog();renderRight();renderCounts();
}

function renderRight(){
  if(activeTab==='priority')renderPriority();
  else if(activeTab==='decisions')renderDecisions();
  else renderMemory();
}

// ── Data ───────────────────────────────────────────────
async function fetchFile(name){
  try{
    const r=await fetch(`${API}/api/file?name=${name}`);
    if(!r.ok)return null;
    return (await r.json()).content;
  }catch{return null;}
}

async function syncAll(){
  const btn=document.getElementById('syncBtn');
  btn.classList.add('spin');
  rawState  = await fetchFile('VELOCITY_STATE.md') || rawState;
  rawMemory = await fetchFile('MEMORY.md')         || rawMemory;
  entries   = parseEntries(rawState);
  renderAll();
  renderMetrics(parseMetrics(rawState));
  const now=new Date();
  document.getElementById('sb-sync').textContent='Last sync: '+now.toLocaleTimeString();
  document.getElementById('hdr-date').textContent=now.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
  btn.classList.remove('spin');
}

// ── Interactions ───────────────────────────────────────
function setFilter(a){activeFilter=a;renderFilters();renderLog();}

function tab(el,t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  activeTab=t;
  renderRight();
}

async function addLog(){
  const agent  = document.getElementById('add-agent').value;
  const status = document.getElementById('add-status').value;
  const text   = document.getElementById('add-text').value.trim();
  if(!text)return;
  const now=new Date();
  const date=now.toISOString().slice(0,10);
  const time=now.toTimeString().slice(0,5);
  const line=`${date} ${time} | ${agent} | ${status} | ${text} | -`;
  document.getElementById('add-text').value='';
  try{
    await fetch(`${API}/api/append`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({line})});
  }catch{}
  await syncAll();
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('add-text').addEventListener('keydown',e=>{if(e.key==='Enter')addLog();});
});

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Boot ───────────────────────────────────────────────
syncAll();
setInterval(syncAll, 60000);
</script>
</body>
</html>
